<!DOCTYPE html>
<html>
<head>
    <title>Hotel Room Booking</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #1c1c1c;
            color: #fff;
        }

        /* HEADER */
        .header {
            background: #d08c7d;
            color: #2b1b18;
            text-align: center;
            padding: 20px;
        }

        .header h1 {
            margin: 0;
        }

        .header p {
            margin-top: 5px;
            font-size: 14px;
        }

        /* CARD */
        .card {
            width: 450px;
            margin: 40px auto;
            background: #111;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 20px #ff9aa2;
        }

        h2 {
            text-align: center;
            color: #ff9aa2;
        }

        fieldset {
            border: 2px solid #ff9aa2;
            border-radius: 10px;
            margin-bottom: 20px;
            padding: 15px;
        }

        legend {
            padding: 0 10px;
            color: #ffb3b3;
            font-weight: bold;
        }

        label {
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            background: #2c2c2c;
            color: white;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
        }

        button {
            width: 48%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .book { background: #ff9aa2; }
        .print { background: #ccc; }

        /* LOGIN POPUP */
        #loginBox {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: #111;
            padding: 25px;
            width: 300px;
            border-radius: 10px;
        }

        .login-card input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            background: #2c2c2c;
            color: white;
        }

        .login-card button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>🏨 Hotel Room Booking</h1>
    <p>Book your stay with comfort and luxury!</p>
</div>

<!-- LOGIN -->
<div id="loginBox">
    <div class="login-card">
        <h3>Login / Register</h3>

        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="login()" style="background:#ff9aa2">Login</button>
        <button onclick="register()" style="background:#ccc">Register</button>
    </div>
</div>

<!-- BOOKING FORM -->
<div class="card">

    <h2>RESERVATION FORM</h2>

    <form id="bookingForm">

        <fieldset>
            <legend>📌 Personal Information</legend>

            <label>Full Name:</label>
            <input type="text" id="name" required>

            <label>Email Address:</label>
            <input type="email" id="email" required>

            <label>Phone Number:</label>
            <input type="text" id="phone" required>
        </fieldset>

        <fieldset>
            <legend>🛏 Booking Details</legend>

            <label>Room Type:</label>
            <select id="roomType">
                <option>Single</option>
                <option>Double</option>
                <option>Suite</option>
            </select>

            <label>Check-in:</label>
            <input type="date" id="checkIn">

            <label>Check-out:</label>
            <input type="date" id="checkOut">
        </fieldset>

        <div class="buttons">
            <button type="submit" class="book">Book Now</button>
            <button type="button" class="print" onclick="window.print()">Print</button>
        </div>

    </form>
</div>

<script>

const API="http://localhost:5000";

/* LOGIN FIRST */
window.onload=()=>{
document.getElementById("loginBox").style.display="flex";
};

/* LOGIN */
async function login(){
const res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:loginEmail.value,
password:loginPassword.value
})
});

const data=await res.json();

if(res.ok){
alert("Login Success 💗");
document.getElementById("loginBox").style.display="none";
}else{
alert(data.message);
}
}

/* REGISTER */
async function register(){
const res=await fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:loginEmail.value,
password:loginPassword.value
})
});

const data=await res.json();

if(res.ok){
alert("Registered 💗 Now login");
}else{
alert(data.message);
}
}

/* BOOKING */
document.getElementById("bookingForm").addEventListener("submit", async function(e){
e.preventDefault();

const res=await fetch(API+"/book",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:name.value,
email:email.value,
phone:phone.value,
roomType:roomType.value,
checkIn:checkIn.value,
checkOut:checkOut.value
})
});

const data=await res.json();

if(res.ok){
alert("Booking Successful 💗 ₹"+data.totalAmount);
document.getElementById("bookingForm").reset();
}else{
alert(data.message);
}
});

</script>

</body>
</html>
